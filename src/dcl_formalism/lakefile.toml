name = "dcl_formalism"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["DclFormalism"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

# Blueprint declaration checker: `lake exe checkdecls blueprint/lean_decls`
# verifies every Lean name referenced in the blueprint actually exists.
[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "DclFormalism"
